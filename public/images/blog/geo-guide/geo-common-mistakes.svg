  <path d="M104 182 L120 198 M120 182 L104 198" stroke="#E43525" stroke-width="3" stroke-linecap="round"/>
  <text x="150" y="180" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#171717">Keyword stuffing without context</text>
  <text x="150" y="206" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#5B5B5B">Repeating phrases doesn't build trust with AI systems</text>

  <rect x="60" y="252" width="1080" height="100" rx="8" fill="#FFFFFF" stroke="#EAEAEA" stroke-width="2"/>
  <rect x="60" y="252" width="6" height="100" fill="#E43525"/>
  <circle cx="112" cy="302" r="20" fill="#FDECEA" stroke="#E43525" stroke-width="2"/>
  <path d="M104 294 L120 310 M120 294 L104 310" stroke="#E43525" stroke-width="3" stroke-linecap="round"/>

  <text x="150" y="628" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#171717">Treating GEO as a one-time task</text>
  <text x="150" y="654" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#5B5B5B">Sustained visibility requires ongoing measurement</text>

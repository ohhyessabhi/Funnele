  <text x="150" y="430" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#5B5B5B">Generative engines favor depth over surface coverage</text>

  <rect x="60" y="476" width="1080" height="100" rx="8" fill="#FFFFFF" stroke="#EAEAEA" stroke-width="2"/>
  <rect x="60" y="476" width="6" height="100" fill="#E43525"/>

  <line x1="848" y1="179" x2="848" y2="174" stroke="#E43525" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="848" y1="205" x2="848" y2="210" stroke="#E43525" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="861" y1="192" x2="866" y2="192" stroke="#E43525" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="830" y1="192" x2="835" y2="192" stroke="#E43525" stroke-width="2.2" stroke-linecap="round"/>

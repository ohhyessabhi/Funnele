  <text x="272" y="496" font-family="Arial, Helvetica, sans-serif" font-size="14.5" fill="#5B5B5B">New landing pages and guides for</text>
  <text x="272" y="516" font-family="Arial, Helvetica, sans-serif" font-size="14.5" fill="#5B5B5B">boat, RV, and truck cleaning</text>


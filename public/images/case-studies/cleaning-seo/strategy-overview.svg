  <line x1="475" y1="198" x2="482" y2="198" stroke="#E43525" stroke-width="1.6"/>
  <text x="456" y="246" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#171717">On-Page Optimization</text>
  <text x="456" y="272" font-family="Arial, Helvetica, sans-serif" font-size="14.5" fill="#5B5B5B">Metadata, copy, and internal</text>
  <text x="456" y="292" font-family="Arial, Helvetica, sans-serif" font-size="14.5" fill="#5B5B5B">linking rebuilt for relevance</text>


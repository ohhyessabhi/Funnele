  <text x="88" y="246" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#171717">Keyword Research</text>
  <text x="88" y="272" font-family="Arial, Helvetica, sans-serif" font-size="14.5" fill="#5B5B5B">High-intent terms across truck</text>
  <text x="88" y="292" font-family="Arial, Helvetica, sans-serif" font-size="14.5" fill="#5B5B5B">wash, detailing, and chemicals</text>


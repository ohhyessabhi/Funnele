  <text x="824" y="272" font-family="Arial, Helvetica, sans-serif" font-size="14.5" fill="#5B5B5B">Site speed, broken links, and</text>
  <text x="824" y="292" font-family="Arial, Helvetica, sans-serif" font-size="14.5" fill="#5B5B5B">schema fixed sitewide</text>


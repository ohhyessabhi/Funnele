  <text x="60" y="98" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700" fill="#171717">Five workstreams, run in parallel</text>

  <!-- Card 1: Keyword Research -->
  <rect x="60" y="140" width="344" height="200" rx="8" fill="#FAFAFA" stroke="#EAEAEA"/>
  <rect x="88" y="168" width="48" height="48" rx="10" fill="#FDECEA"/>

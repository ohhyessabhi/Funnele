  <text x="88" y="272" font-family="Arial, Helvetica, sans-serif" font-size="14.5" fill="#5B5B5B">High-intent terms across clubs,</text>
  <text x="88" y="292" font-family="Arial, Helvetica, sans-serif" font-size="14.5" fill="#5B5B5B">wedges, and complete sets</text>

